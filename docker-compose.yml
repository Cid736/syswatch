services:
  syswatch:
    build: .
    # pid: host and volume mounts let psutil read the HOST machine's real metrics
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./config.yml:/app/config.yml   # edit thresholds without rebuilding
    env_file:
      - .env                           # optional: TELEGRAM_TOKEN + TELEGRAM_CHAT_ID
    environment:
      - PYTHONUNBUFFERED=1
    command: ["run", "--interval", "1"]
